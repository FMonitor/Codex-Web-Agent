services:
  codex-cli:
    container_name: codex-cli-runtime
    build:
      context: .
    user: "${CODEX_CONTAINER_UID:-0}:${CODEX_CONTAINER_GID:-0}"
    stdin_open: true
    tty: true
    environment:
      HOME: /home/codex
      CODEX_HOME: /home/codex/.codex
      CODEX_DEFAULT_MODEL: ${CODEX_DEFAULT_MODEL:-gpt-5-codex}
      CODEX_OPENAI_MODEL: ${CODEX_OPENAI_MODEL:-gpt-5-codex}
      CODEX_CUSTOM_API_MODEL: ${CODEX_CUSTOM_API_MODEL:-gpt-5-codex}
      CODEX_CUSTOM_API_BASE_URL: ${CODEX_CUSTOM_API_COMPAT_BASE_URL:-http://codex-responses-proxy:11434/v1}
      CODEX_CUSTOM_API_KEY_ENV: ${CODEX_CUSTOM_API_KEY_ENV:-CUSTOM_LLM_API_KEY}
      CUSTOM_LLM_API_KEY: ${CUSTOM_LLM_API_KEY:-}
      CODEX_CUSTOM_OPENAI_AUTH_BASE_URL: ${CODEX_CUSTOM_OPENAI_AUTH_BASE_URL:-}
      CODEX_CUSTOM_OPENAI_AUTH_MODEL: ${CODEX_CUSTOM_OPENAI_AUTH_MODEL:-gpt-5-codex}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - codex-home:/home/codex/.codex
      - ${HOST_WORKSPACE_ROOT:-/home/monitor}:${HOST_WORKSPACE_ROOT:-/home/monitor}
    working_dir: ${HOST_WORKSPACE_ROOT:-/home/monitor}
    depends_on:
      - codex-responses-proxy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  codex-responses-proxy:
    container_name: codex-responses-proxy
    image: node:22-bookworm-slim
    command: ["node", "/app/responses-compat-proxy.mjs"]
    environment:
      PORT: 11434
      UPSTREAM_BASE_URL: ${UPSTREAM_BASE_URL:-https://gemma4.lcmonitor.dynv6.net:8002/v1}
      UPSTREAM_API_KEY: ${CUSTOM_LLM_API_KEY:-}
    ports:
      - "${CODEX_RESPONSES_PROXY_PORT:-11434}:11434"
    volumes:
      - ./responses-compat-proxy.mjs:/app/responses-compat-proxy.mjs:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  codex-home:
