services:
  app:
    container_name: copilot-console-app
    build:
      context: ..
      dockerfile: app/Dockerfile
      args:
        NPM_MIRROR: ${NPM_MIRROR:-https://registry.npmmirror.com}
        APT_MIRROR: ${APT_MIRROR:-http://mirrors.aliyun.com/debian}
        APT_SECURITY_MIRROR: ${APT_SECURITY_MIRROR:-http://mirrors.aliyun.com/debian-security}
    environment:
      PORT: 8787
      DEFAULT_RUNTIME: ${DEFAULT_RUNTIME:-codex-cli}
      DEFAULT_WORKSPACE_PATH: ${DEFAULT_WORKSPACE_PATH:-/host-workspace}
      CODEX_CLI_COMMAND: ${CODEX_CLI_COMMAND:-docker exec -i codex-cli-runtime codex}
      CODEX_CUSTOM_API_BASE_URL: ${CODEX_CUSTOM_API_BASE_URL:-http://api-adapter:11434/v1}
      CODEX_MODEL: ${CODEX_MODEL:-Qwen3.5-9B-Q5_K_M}
      CODEX_PROFILE: ${CODEX_PROFILE:-custom-api}
      CODEX_SANDBOX: ${CODEX_SANDBOX:-workspace-write}
    ports:
      - "${APP_PORT:-8787}:8787"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOST_WORKSPACE_ROOT:-/home/monitor}:/host-workspace
    depends_on:
      - codex-cli
      - api-adapter

  codex-cli:
    container_name: codex-cli-runtime
    build:
      context: ../CodexCLI
      args:
        NPM_MIRROR: ${NPM_MIRROR:-https://registry.npmmirror.com}
        APT_MIRROR: ${APT_MIRROR:-http://mirrors.aliyun.com/debian}
        APT_SECURITY_MIRROR: ${APT_SECURITY_MIRROR:-http://mirrors.aliyun.com/debian-security}
    user: "${CODEX_CONTAINER_UID:-0}:${CODEX_CONTAINER_GID:-0}"
    stdin_open: true
    tty: true
    environment:
      HOME: /home/codex
      CODEX_HOME: /home/codex/.codex
      CODEX_DEFAULT_MODEL: ${CODEX_DEFAULT_MODEL:-Qwen3.5-9B-Q5_K_M}
      CODEX_OPENAI_MODEL: ${CODEX_OPENAI_MODEL:-gpt-5-codex}
      CODEX_CUSTOM_API_MODEL: ${CODEX_CUSTOM_API_MODEL:-Qwen3.5-9B-Q5_K_M}
      CODEX_CUSTOM_API_BASE_URL: ${CODEX_CUSTOM_API_BASE_URL:-http://api-adapter:11434/v1}
      CODEX_CUSTOM_API_KEY_ENV: ${CODEX_CUSTOM_API_KEY_ENV:-CUSTOM_LLM_API_KEY}
      CUSTOM_LLM_API_KEY: ${CUSTOM_LLM_API_KEY:-dummy}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - codex-home:/home/codex/.codex
      - ${HOST_WORKSPACE_ROOT:-/home/monitor}:/host-workspace
    working_dir: /host-workspace
    extra_hosts:
      - "host.docker.internal:host-gateway"

  api-adapter:
    container_name: codex-api-adapter
    build:
      context: ../APIAdapter
      args:
        NPM_MIRROR: ${NPM_MIRROR:-https://registry.npmmirror.com}
    environment:
      PORT: 11434
      UPSTREAM_BASE_URL: ${UPSTREAM_BASE_URL:-http://host.docker.internal:8002/v1}
      UPSTREAM_API_KEY: ${UPSTREAM_API_KEY:-${CUSTOM_LLM_API_KEY:-}}
    ports:
      - "${API_ADAPTER_PORT:-11434}:11434"
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  codex-home:
